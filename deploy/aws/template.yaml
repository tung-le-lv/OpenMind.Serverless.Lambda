AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Order Microservice - Clean Architecture with CQRS on AWS Lambda

Globals:
  Function:
    Timeout: 60
    MemorySize: 512
    Runtime: dotnet8
    Architectures:
      - x86_64
    Tracing: Active
    Environment:
      Variables:
        ORDERS_TABLE: !Ref OrdersTable
        ORDER_EVENTS_TOPIC_ARN: !Ref OrderEventsTopic
        POWERTOOLS_SERVICE_NAME: OrderService
        POWERTOOLS_METRICS_NAMESPACE: OrderService
        POWERTOOLS_LOG_LEVEL: INFO
        POWERTOOLS_LOGGER_LOG_EVENT: true

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod

Resources:
  # DynamoDB Table
  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'Orders-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: customerId
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: CustomerIdIndex
          KeySchema:
            - AttributeName: customerId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # SNS Topic for Order Domain Events
  OrderEventsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub 'order-events-topic-${Environment}'

  # SNS Topic for Payment Domain Events
  PaymentEventsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub 'payment-events-topic-${Environment}.fifo'
      FifoTopic: true
      ContentBasedDeduplication: true

  # DynamoDB Table for Payments
  PaymentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'Payments-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: orderId
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: OrderIdIndex
          KeySchema:
            - AttributeName: orderId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # SQS: Payment service consumes OrderPlaced events from Order SNS topic
  PaymentOrderEventsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'payment-order-events-sqs-${Environment}'
      VisibilityTimeout: 300
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt PaymentOrderEventsDLQ.Arn
        maxReceiveCount: 3

  PaymentOrderEventsDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'payment-order-events-dlq-${Environment}'

  PaymentOrderEventsQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref PaymentOrderEventsQueue
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt PaymentOrderEventsQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref OrderEventsTopic

  PaymentOrderEventsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref OrderEventsTopic
      Protocol: sqs
      Endpoint: !GetAtt PaymentOrderEventsQueue.Arn
      FilterPolicy:
        EventType:
          - OrderPlaced

  # SQS: Order service consumes PaymentProcessed events from Payment SNS topic
  OrderPaymentEventsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'order-payment-events-sqs-${Environment}.fifo'
      FifoQueue: true
      ContentBasedDeduplication: true
      VisibilityTimeout: 300
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt OrderPaymentEventsDLQ.Arn
        maxReceiveCount: 3

  OrderPaymentEventsDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'order-payment-events-dlq-${Environment}.fifo'
      FifoQueue: true

  OrderPaymentEventsQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref OrderPaymentEventsQueue
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt OrderPaymentEventsQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref PaymentEventsTopic

  OrderPaymentEventsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref PaymentEventsTopic
      Protocol: sqs
      Endpoint: !GetAtt OrderPaymentEventsQueue.Arn
      FilterPolicy:
        EventType:
          - PaymentProcessed

  # Lambda Functions
  CreateOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'Order-CreateOrder-${Environment}'
      Handler: Order.Api::Order.Api.Features.CreateOrder.CreateOrderFunction::Handler
      CodeUri: ./src/Order.Api/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OrdersTable
      Events:
        CreateOrder:
          Type: Api
          Properties:
            RestApiId: !Ref OrderApi
            Path: /orders
            Method: POST

  PlaceOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'Order-PlaceOrder-${Environment}'
      Handler: Order.Api::Order.Api.Features.PlaceOrder.PlaceOrderFunction::Handler
      CodeUri: ./src/Order.Api/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OrdersTable
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt OrderEventsTopic.TopicName
      Events:
        PlaceOrder:
          Type: Api
          Properties:
            RestApiId: !Ref OrderApi
            Path: /orders/{id}/place
            Method: POST

  GetOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'Order-GetOrder-${Environment}'
      Handler: Order.Api::Order.Api.Features.GetOrder.GetOrderFunction::Handler
      CodeUri: ./src/Order.Api/
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref OrdersTable
      Events:
        GetOrder:
          Type: Api
          Properties:
            RestApiId: !Ref OrderApi
            Path: /orders/{id}
            Method: GET

  GetAllOrdersFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'Order-GetAllOrders-${Environment}'
      Handler: Order.Api::Order.Api.Features.GetAllOrders.GetAllOrdersFunction::Handler
      CodeUri: ./src/Order.Api/
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref OrdersTable
      Events:
        GetAllOrders:
          Type: Api
          Properties:
            RestApiId: !Ref OrderApi
            Path: /orders
            Method: GET

  GetOrdersByCustomerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'Order-GetOrdersByCustomer-${Environment}'
      Handler: Order.Api::Order.Api.Features.GetOrdersByCustomer.GetOrdersByCustomerFunction::Handler
      CodeUri: ./src/Order.Api/
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref OrdersTable
      Events:
        GetOrdersByCustomer:
          Type: Api
          Properties:
            RestApiId: !Ref OrderApi
            Path: /orders/customer/{customerId}
            Method: GET

  UpdateOrderStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'Order-UpdateOrderStatus-${Environment}'
      Handler: Order.Api::Order.Api.Features.UpdateOrderStatus.UpdateOrderStatusFunction::Handler
      CodeUri: ./src/Order.Api/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OrdersTable
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt OrderEventsTopic.TopicName
      Events:
        UpdateOrderStatus:
          Type: Api
          Properties:
            RestApiId: !Ref OrderApi
            Path: /orders/{id}/status
            Method: PUT

  CancelOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'Order-CancelOrder-${Environment}'
      Handler: Order.Api::Order.Api.Features.CancelOrder.CancelOrderFunction::Handler
      CodeUri: ./src/Order.Api/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OrdersTable
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt OrderEventsTopic.TopicName
      Events:
        CancelOrder:
          Type: Api
          Properties:
            RestApiId: !Ref OrderApi
            Path: /orders/{id}/cancel
            Method: POST

  AddOrderItemFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'Order-AddOrderItem-${Environment}'
      Handler: Order.Api::Order.Api.Features.AddOrderItem.AddOrderItemFunction::Handler
      CodeUri: ./src/Order.Api/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OrdersTable
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt OrderEventsTopic.TopicName
      Events:
        AddOrderItem:
          Type: Api
          Properties:
            RestApiId: !Ref OrderApi
            Path: /orders/{id}/items
            Method: POST

  DeleteOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'Order-DeleteOrder-${Environment}'
      Handler: Order.Api::Order.Api.Features.DeleteOrder.DeleteOrderFunction::Handler
      CodeUri: ./src/Order.Api/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OrdersTable
      Events:
        DeleteOrder:
          Type: Api
          Properties:
            RestApiId: !Ref OrderApi
            Path: /orders/{id}
            Method: DELETE

  # Payment Lambda - triggered by SQS (payment-order-events-sqs)
  ProcessPaymentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'Payment-ProcessPayment-${Environment}'
      Handler: Payment.Api::Payment.Api.Features.ProcessPayment.ProcessPaymentFunction::Handler
      CodeUri: ./src/Payment.Api/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PaymentsTable
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt PaymentEventsTopic.TopicName
        - SQSPollerPolicy:
            QueueName: !GetAtt PaymentOrderEventsQueue.QueueName
      Environment:
        Variables:
          PAYMENTS_TABLE: !Ref PaymentsTable
          PAYMENT_EVENTS_TOPIC_ARN: !Ref PaymentEventsTopic
          POWERTOOLS_SERVICE_NAME: PaymentService
          POWERTOOLS_METRICS_NAMESPACE: PaymentService
      Events:
        SQSTrigger:
          Type: SQS
          Properties:
            Queue: !GetAtt PaymentOrderEventsQueue.Arn
            BatchSize: 1
            FunctionResponseTypes:
              - ReportBatchItemFailures

  # Order Lambda - triggered by SQS (order-payment-events-sqs), updates order to PaymentConfirmed
  HandlePaymentProcessedFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'Order-HandlePaymentProcessed-${Environment}'
      Handler: Order.Api::Order.Api.Features.HandlePaymentProcessed.HandlePaymentProcessedFunction::Handler
      CodeUri: ./src/Order.Api/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OrdersTable
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt OrderEventsTopic.TopicName
        - SQSPollerPolicy:
            QueueName: !GetAtt OrderPaymentEventsQueue.QueueName
      Events:
        SQSTrigger:
          Type: SQS
          Properties:
            Queue: !GetAtt OrderPaymentEventsQueue.Arn
            BatchSize: 1
            FunctionResponseTypes:
              - ReportBatchItemFailures

  # API Gateway
  OrderApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub 'Order-API-${Environment}'
      StageName: !Ref Environment
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${OrderApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/'

  OrdersTableName:
    Description: DynamoDB Orders table name
    Value: !Ref OrdersTable

  OrderEventsTopicArn:
    Description: SNS Topic ARN for order events
    Value: !Ref OrderEventsTopic

  PaymentEventsTopicArn:
    Description: SNS Topic ARN for payment events
    Value: !Ref PaymentEventsTopic

  PaymentsTableName:
    Description: DynamoDB Payments table name
    Value: !Ref PaymentsTable

  PaymentOrderEventsQueueUrl:
    Description: SQS Queue URL for payment service consuming order events
    Value: !Ref PaymentOrderEventsQueue

  OrderPaymentEventsQueueUrl:
    Description: SQS Queue URL for order service consuming payment events
    Value: !Ref OrderPaymentEventsQueue

